name: CI (Continuous Integration)

on:
  push:
    # branches: [ "master", "main" ]
  pull_request:
    # branches: [ "master", "main" ]

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - { dir: "l1-identity-context", image: "l1-identity" }
          - { dir: "l2-knowledge-graph-v3", image: "l2-knowledge" }
          - { dir: "l3-intelligent-retrieval", image: "l3-retrieval" }
          - { dir: "l4-policy-resolution", image: "l4-policy" }
          - { dir: "l5-secure-generation", image: "l5-generation" }
          - { dir: "l6-multi-gate-validation", image: "l6-validation" }
          - { dir: "l7-secure-execution", image: "l7-execution" }
          - { dir: "l8-audit-anomaly", image: "l8-audit" }
          - { dir: "front-end", image: "front-end" }
          - { dir: "frontend", image: "frontend" }

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Test (if applicable)
        run: |
          cd ${{ matrix.service.dir }}
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
            # pytest
          fi
          if [ -f package.json ]; then
            # npm install
            # npm test
            echo "Node project found"
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push Image
        run: |
          cd ${{ matrix.service.dir }}
          # Build with the commit SHA as the tag
          docker build -t jimsonrats/${{ matrix.service.image }}:${{ github.sha }} .
          # Push the image to Docker Hub
          docker push jimsonrats/${{ matrix.service.image }}:${{ github.sha }}
