apiVersion: v1
kind: Secret
metadata:
  name: sentinelsql-secrets
  namespace: sentinelsql
type: Opaque
stringData:
  # L1 & Front-end Auth
  SENTINELSQL_SESSION_SECRET: "REPLACE_WITH_SECURE_SESSION_SECRET"
  
  # Neo4j Database
  NEO4J_USERNAME: "REPLACE_ME"
  NEO4J_PASSWORD: "REPLACE_WITH_NEO4J_PASSWORD"
  NEO4J_READ_PASSWORD: "REPLACE_WITH_NEO4J_PASSWORD"   # L2 field name
  NEO4J_WRITE_PASSWORD: "REPLACE_WITH_NEO4J_PASSWORD"  # L2 field name
  
  # Aiven Postgres
  AIVEN_PG_USER: "REPLACE_ME"
  AIVEN_PG_PASSWORD: "REPLACE_WITH_POSTGRES_PASSWORD"
  
  # Audit Postgres DSN
  # Combine host/password dynamically in code or replace this whole string
  PG_AUDIT_DSN: "postgresql+asyncpg://REPLACE_WITH_USER:REPLACE_WITH_PASSWORD@pg-hospital-system-hospital-syatem.k.aivencloud.com:21400/apollo_analytics"
  PG_VECTOR_DSN: "postgresql+asyncpg://REPLACE_WITH_USER:REPLACE_WITH_PASSWORD@pg-hospital-system-hospital-syatem.k.aivencloud.com:21400/apollo_analytics"
  
  # Aiven MySQL
  MYSQL_USER: "REPLACE_ME"
  MYSQL_PASSWORD: "REPLACE_WITH_MYSQL_PASSWORD"

  # Azure OpenAI
  AZURE_AI_API_KEY: "REPLACE_WITH_AZURE_AI_API_KEY"
  
  # Vault (If used)
  VAULT_TOKEN: "REPLACE_ME"
  
  # Internal Service Auth
  SERVICE_TOKEN_SECRET: "REPLACE_WITH_SECURE_INTERNAL_TOKEN_SECRET_32_CHARS"
  ENVELOPE_SIGNING_KEY: "REPLACE_WITH_SECURE_ENVELOPE_SIGNING_KEY_32_CHARS"
  L1_HMAC_SECRET_KEY: "REPLACE_WITH_SECURE_HMAC_KEY_MUST_BE_MINIMUM_32_CHARS"
  
  # Keys
  SENTINELSQL_PRIVATE_KEY: |
    -----BEGIN RSA PRIVATE KEY-----
    REPLACE_WITH_ACTUAL_BASE64_PRIVATE_KEY
    -----END RSA PRIVATE KEY-----
  SENTINELSQL_PUBLIC_KEY: |
    -----BEGIN PUBLIC KEY-----
    REPLACE_WITH_ACTUAL_BASE64_PUBLIC_KEY
    -----END PUBLIC KEY-----
