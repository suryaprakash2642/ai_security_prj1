apiVersion: v1
kind: Secret
metadata:
  name: sentinelsql-secrets
  namespace: sentinelsql
type: Opaque
stringData:
  # Base Environment
  APP_ENV: "production"
  
  # L1 & Front-end Auth
  SENTINELSQL_SESSION_SECRET: "REPLACE_WITH_SECURE_SESSION_SECRET"
  USE_MOCK_IDP: "true"
  IDP_JWKS_URI: "https://dev.okta.com/oauth2/v1/keys"
  IDP_ISSUER: "https://dev.okta.com"
  IDP_AUDIENCE: "api://sentinelsql"
  CORS_ORIGINS: "http://sentinelsql.yourdomain.com,https://sentinelsql.yourdomain.com"
  
  # Neo4j Database
  NEO4J_URI: "REPLACE_WITH_NEO4J_URI"
  NEO4J_USERNAME: "REPLACE_WITH_NEO4J_USERNAME"
  NEO4J_READ_USER: "REPLACE_WITH_NEO4J_READ_USER"
  NEO4J_WRITE_USER: "REPLACE_WITH_NEO4J_WRITE_USER"
  NEO4J_PASSWORD: "REPLACE_WITH_NEO4J_PASSWORD"
  NEO4J_READ_PASSWORD: "REPLACE_WITH_NEO4J_READ_PASSWORD"  # L2 field name
  NEO4J_WRITE_PASSWORD: "REPLACE_WITH_NEO4J_WRITE_PASSWORD" # L2 field name
  NEO4J_DATABASE: "REPLACE_WITH_NEO4J_DATABASE"
  NEO4J_ENCRYPTED: "true"
  
  # Aiven Postgres
  AIVEN_PG_HOST: "REPLACE_WITH_PG_HOST"
  AIVEN_PG_PORT: "REPLACE_WITH_PG_PORT"
  AIVEN_PG_USER: "REPLACE_WITH_PG_USER"
  AIVEN_PG_PASSWORD: "REPLACE_WITH_PG_PASSWORD"
  POSTGRES_HOST: "REPLACE_WITH_PG_HOST"  # L7 field name
  POSTGRES_USER: "REPLACE_WITH_PG_USER"                                              # L7 field name
  POSTGRES_PASSWORD: "REPLACE_WITH_PG_PASSWORD"                         # L7 field name
  POSTGRES_DBNAME_ANALYTICS: "REPLACE_WITH_PG_DBNAME_ANALYTICS"
  POSTGRES_DBNAME_FINANCIAL: "REPLACE_WITH_PG_DBNAME_FINANCIAL"
  POSTGRES_SSLMODE: "require"
  
  # Audit Postgres DSN
  PG_AUDIT_DSN: "REPLACE_WITH_PG_AUDIT_DSN"
  PG_VECTOR_DSN: "REPLACE_WITH_PG_VECTOR_DSN"
  
  # Aiven MySQL
  MYSQL_HOST: "REPLACE_WITH_MYSQL_HOST"
  MYSQL_PORT: "REPLACE_WITH_MYSQL_PORT"
  MYSQL_USER: "REPLACE_WITH_MYSQL_USER"
  MYSQL_PASSWORD: "REPLACE_WITH_MYSQL_PASSWORD"
  MYSQL_DBNAME_HIS: "REPLACE_WITH_MYSQL_DBNAME_HIS"
  MYSQL_DBNAME_HR: "REPLACE_WITH_MYSQL_DBNAME_HR"
  MYSQL_SSL: "true"

  # Azure OpenAI
  AZURE_AI_ENDPOINT: "REPLACE_WITH_AZURE_AI_ENDPOINT"
  AZURE_AI_API_KEY: "REPLACE_WITH_AZURE_AI_API_KEY"
  AZURE_OPENAI_DEPLOYMENT: "REPLACE_WITH_AZURE_OPENAI_DEPLOYMENT"
  AZURE_OPENAI_FALLBACK_DEPLOYMENT: "REPLACE_WITH_AZURE_OPENAI_FALLBACK_DEPLOYMENT"
  
  # Redis URL
  REDIS_URL: "redis://redis.sentinelsql.svc.cluster.local:6379/0"
  L1_REDIS_URL: "redis://redis.sentinelsql.svc.cluster.local:6379/0"
  
  # Vault (If used)
  VAULT_ADDR: "http://vault:8200"
  VAULT_TOKEN: "REPLACE_ME"
  
  # Internal Service Auth
  SERVICE_TOKEN_SECRET: "REPLACE_WITH_SECURE_INTERNAL_TOKEN_SECRET_32_CHARS"
  ENVELOPE_SIGNING_KEY: "REPLACE_WITH_SECURE_ENVELOPE_SIGNING_KEY_32_CHARS"
  L1_HMAC_SECRET_KEY: "REPLACE_WITH_SECURE_HMAC_KEY_MUST_BE_MINIMUM_32_CHARS"
  
  # Keys
  SENTINELSQL_PRIVATE_KEY: "REPLACE_WITH_RSA_PRIVATE_KEY"
  SENTINELSQL_PUBLIC_KEY: "REPLACE_WITH_RSA_PUBLIC_KEY"
