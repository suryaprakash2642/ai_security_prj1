apiVersion: apps/v1
kind: Deployment
metadata:
  name: l5-generation
  namespace: sentinelsql
  labels:
    app: l5-generation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: l5-generation
  template:
    metadata:
      labels:
        app: l5-generation
    spec:
      nodeSelector:
        workload: sentinelsql
      tolerations:
        - key: dedicated
          operator: Equal
          value: sentinelsql
          effect: NoSchedule
      containers:
        - name: l5-generation
          image: jimsonrats/l5-generation:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8500
          envFrom:
            - configMapRef:
                name: sentinelsql-config
            - secretRef:
                name: sentinelsql-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8500
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8500
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "768Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: l5-generation
  namespace: sentinelsql
spec:
  selector:
    app: l5-generation
  ports:
    - protocol: TCP
      port: 8500
      targetPort: 8500
