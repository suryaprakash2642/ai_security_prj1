apiVersion: apps/v1
kind: Deployment
metadata:
  name: l2-knowledge
  namespace: sentinelsql
  labels:
    app: l2-knowledge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: l2-knowledge
  template:
    metadata:
      labels:
        app: l2-knowledge
    spec:
      nodeSelector:
        workload: sentinelsql
      tolerations:
        - key: dedicated
          operator: Equal
          value: sentinelsql
          effect: NoSchedule
      containers:
        - name: l2-knowledge
          image: jimsonrats/l2-knowledge:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8002
          env:
            - name: APP_PORT
              value: "8002"
          envFrom:
            - configMapRef:
                name: sentinelsql-config
            - secretRef:
                name: sentinelsql-secrets
          startupProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 18
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: l2-knowledge
  namespace: sentinelsql
spec:
  selector:
    app: l2-knowledge
  ports:
    - protocol: TCP
      port: 8002
      targetPort: 8002
