apiVersion: apps/v1
kind: Deployment
metadata:
  name: l4-policy
  namespace: sentinelsql
  labels:
    app: l4-policy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: l4-policy
  template:
    metadata:
      labels:
        app: l4-policy
    spec:
      nodeSelector:
        workload: sentinelsql
      tolerations:
        - key: dedicated
          operator: Equal
          value: sentinelsql
          effect: NoSchedule
      containers:
        - name: l4-policy
          image: jimsonrats/l4-policy:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8400
          env:
            - name: NEO4J_USER
              valueFrom:
                secretKeyRef:
                  name: sentinelsql-secrets
                  key: NEO4J_USERNAME
          envFrom:
            - configMapRef:
                name: sentinelsql-config
            - secretRef:
                name: sentinelsql-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8400
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8400
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: l4-policy
  namespace: sentinelsql
spec:
  selector:
    app: l4-policy
  ports:
    - protocol: TCP
      port: 8400
      targetPort: 8400
