<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apollo Hospitals — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --teal: #0B6E6E;
      --dark: #063E3E;
      --gold: #C9A84C;
      --glass: rgba(8, 32, 32, 0.75);
      --border: rgba(255, 255, 255, 0.14);
      --txt: rgba(255, 255, 255, 0.92);
      --muted: rgba(255, 255, 255, 0.42);
      --in-bg: rgba(255, 255, 255, 0.07);
      --in-border: rgba(255, 255, 255, 0.14);
      --err: #F87171;
    }

    body {
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      background: #041818;
    }

    /* ── BG ─────────────────────────────────────── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: linear-gradient(170deg, #0a1628 0%, #0d2d3a 28%, #0a3d3d 58%, #041818 100%);
    }

    .stars {
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 8% 12%, rgba(255, 255, 255, .6) 0%, transparent 100%),
        radial-gradient(1px 1px at 22% 7%, rgba(255, 255, 255, .4) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 38% 18%, rgba(255, 255, 255, .5) 0%, transparent 100%),
        radial-gradient(1px 1px at 52% 10%, rgba(255, 255, 255, .3) 0%, transparent 100%),
        radial-gradient(1px 1px at 67% 15%, rgba(255, 255, 255, .5) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 80% 8%, rgba(255, 255, 255, .4) 0%, transparent 100%),
        radial-gradient(1px 1px at 91% 20%, rgba(255, 255, 255, .6) 0%, transparent 100%),
        radial-gradient(1px 1px at 44% 5%, rgba(255, 255, 255, .5) 0%, transparent 100%),
        radial-gradient(1px 1px at 72% 3%, rgba(255, 255, 255, .4) 0%, transparent 100%),
        radial-gradient(1px 1px at 16% 30%, rgba(255, 255, 255, .2) 0%, transparent 100%),
        radial-gradient(1px 1px at 58% 28%, rgba(255, 255, 255, .3) 0%, transparent 100%);
    }

    .moon {
      position: absolute;
      top: 7%;
      right: 11%;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #FFF9E6, #F5D98B);
      box-shadow: 0 0 20px rgba(245, 217, 139, .3), 0 0 60px rgba(245, 217, 139, .1);
      animation: mf 8s ease-in-out infinite;
    }

    @keyframes mf {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-6px)
      }
    }

    .moon::after {
      content: '';
      position: absolute;
      inset: -14px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(245, 217, 139, .08) 0%, transparent 70%);
    }

    .hosp-wrap {
      position: absolute;
      bottom: 55px;
      left: 50%;
      transform: translateX(-50%);
      width: min(1100px, 100vw);
      pointer-events: none;
    }

    .ground {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: linear-gradient(to top, #020e0e, #041414 60%, transparent);
    }

    .trees {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 130px;
      background:
        radial-gradient(ellipse 58px 78px at 7% 100%, #031818 0%, transparent 70%),
        radial-gradient(ellipse 44px 62px at 13% 90%, #041f1f 0%, transparent 70%),
        radial-gradient(ellipse 50px 72px at 3% 95%, #031414 0%, transparent 70%),
        radial-gradient(ellipse 58px 78px at 93% 100%, #031818 0%, transparent 70%),
        radial-gradient(ellipse 44px 62px at 87% 90%, #041f1f 0%, transparent 70%),
        radial-gradient(ellipse 50px 72px at 97% 95%, #031414 0%, transparent 70%);
    }

    /* ── CARD ────────────────────────────────────── */
    .card-wrap {
      position: relative;
      z-index: 10;
      width: 410px;
      animation: reveal .65s cubic-bezier(.16, 1, .3, 1) both;
    }

    @keyframes reveal {
      from {
        opacity: 0;
        transform: translateY(22px) scale(.97)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    .card {
      background: var(--glass);
      backdrop-filter: blur(26px) saturate(1.4);
      -webkit-backdrop-filter: blur(26px) saturate(1.4);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 42px 38px 34px;
      box-shadow: 0 28px 72px rgba(0, 0, 0, .65), 0 0 0 1px rgba(255, 255, 255, .04) inset, 0 1px 0 rgba(255, 255, 255, .07) inset;
    }

    .card-hd {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo {
      width: 50px;
      height: 50px;
      margin: 0 auto 14px;
      background: linear-gradient(135deg, #0B6E6E, #0d9090);
      border-radius: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: 0 6px 22px rgba(11, 110, 110, .45);
      border: 1px solid rgba(255, 255, 255, .1);
    }

    .h-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 25px;
      font-weight: 600;
      color: var(--txt);
      letter-spacing: .3px;
      margin-bottom: 3px;
    }

    .h-name span {
      font-style: italic;
      color: var(--gold);
    }

    .h-sub {
      font-size: 10.5px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .divider {
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border), transparent);
      margin: 0 0 26px;
    }

    /* Pills */
    .pill-lbl {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 9px;
    }

    .pills {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .pill {
      flex: 1;
      padding: 8px 0;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid var(--in-border);
      transition: all .2s cubic-bezier(.34, 1.56, .64, 1);
      text-align: center;
      color: rgba(255, 255, 255, .6);
      background: var(--in-bg);
      user-select: none;
    }

    .pill:hover {
      transform: translateY(-2px);
      color: #fff;
    }

    .pill.active {
      color: #fff;
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(0, 0, 0, .3);
    }

    .pill[data-u="dr.arjun"].active {
      background: rgba(14, 165, 233, .18);
      border-color: #0EA5E9;
      box-shadow: 0 4px 18px rgba(14, 165, 233, .22);
    }

    .pill[data-u="nurse.priya"].active {
      background: rgba(16, 185, 129, .18);
      border-color: #10B981;
      box-shadow: 0 4px 18px rgba(16, 185, 129, .22);
    }

    .pill[data-u="pharma.ravi"].active {
      background: rgba(236, 72, 153, .18);
      border-color: #EC4899;
      box-shadow: 0 4px 18px rgba(236, 72, 153, .22);
    }

    /* Fields */
    .field {
      margin-bottom: 15px;
    }

    .field-lbl {
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 7px;
      display: block;
    }

    .fw {
      position: relative;
    }

    .fi {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 13px;
      opacity: .38;
      pointer-events: none;
    }

    .fw input {
      width: 100%;
      padding: 12px 16px 12px 38px;
      background: var(--in-bg);
      border: 1.5px solid var(--in-border);
      border-radius: 10px;
      font-size: 14px;
      font-family: 'Outfit', sans-serif;
      color: var(--txt);
      outline: none;
      transition: border-color .2s, background .2s, box-shadow .2s;
      caret-color: var(--gold);
    }

    .fw input::placeholder {
      color: rgba(255, 255, 255, .2);
    }

    .fw input:focus {
      border-color: rgba(201, 168, 76, .52);
      background: rgba(255, 255, 255, .09);
      box-shadow: 0 0 0 3px rgba(201, 168, 76, .1);
    }

    .fw input.ef {
      border-color: rgba(248, 113, 113, .45);
      box-shadow: 0 0 0 3px rgba(248, 113, 113, .08);
    }

    input[type="password"] {
      letter-spacing: 3px;
    }

    .tpw {
      position: absolute;
      right: 11px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 13px;
      padding: 4px;
      transition: color .2s;
    }

    .tpw:hover {
      color: var(--txt);
    }

    /* Error */
    .err {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: rgba(248, 113, 113, .1);
      border: 1px solid rgba(248, 113, 113, .22);
      border-radius: 8px;
      font-size: 13px;
      color: var(--err);
      margin-bottom: 15px;
    }

    .err.show {
      display: flex;
    }

    /* Button */
    .btn {
      width: 100%;
      padding: 13px;
      margin-top: 3px;
      background: linear-gradient(135deg, #0B6E6E, #0d9090);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      letter-spacing: .4px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all .22s;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, .08), transparent);
      opacity: 0;
      transition: opacity .2s;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 26px rgba(11, 110, 110, .48);
    }

    .btn:hover::before {
      opacity: 1;
    }

    .btn:disabled {
      opacity: .5;
      cursor: not-allowed;
      transform: none;
    }

    .sp {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, .22);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .65s linear infinite;
    }

    .btn.loading .bt {
      display: none;
    }

    .btn.loading .sp {
      display: block;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    /* Footer */
    .card-ft {
      text-align: center;
      margin-top: 20px;
      font-size: 11px;
      color: var(--muted);
    }

    .card-ft span {
      color: rgba(201, 168, 76, .65);
      font-weight: 500;
    }

    @media(max-width:480px) {
      .card-wrap {
        width: calc(100vw - 28px)
      }

      .card {
        padding: 34px 22px 28px
      }
    }
  </style>
</head>

  <!-- CARD -->
  <div class="card-wrap">
    <div class="card">
      <div class="card-hd">
        <div class="logo">🏥</div>
        <div class="h-name">Apollo <span>Hospitals</span></div>
        <div class="h-sub">Staff Portal</div>
      </div>
      <div class="divider"></div>

      <!-- Unified Login -->


      <div class="err" id="errMsg"><span>⚠</span><span id="errTxt">Invalid credentials</span></div>

      <form id="lf" autocomplete="off">
        <div class="field">
          <label class="field-lbl" for="un">Username</label>
          <div class="fw"><span class="fi">👤</span>
            <input type="text" id="un" name="username" placeholder="Enter username" value="" required />
          </div>
        </div>
        <div class="field">
          <label class="field-lbl" for="pw">Password</label>
          <div class="fw"><span class="fi">🔑</span>
            <input type="password" id="pw" name="password" placeholder="Enter password" value="" required />
            <button type="button" class="tpw" id="tpw">👁</button>
          </div>
        </div>
        <button type="submit" class="btn" id="sb">
          <span class="bt">Sign In →</span>
          <div class="sp"></div>
        </button>
      </form>

      <div class="card-ft">Apollo Hospitals · <span>Secure Staff Access</span></div>
    </div>
  </div>

  <script>

    document.getElementById('tpw').addEventListener('click', () => {
      const f = document.getElementById('pw');
      f.type = f.type === 'password' ? 'text' : 'password';
    });
    function show(m) {
      document.getElementById('errTxt').textContent = m;
      document.getElementById('errMsg').classList.add('show');
      document.getElementById('un').classList.add('ef');
      document.getElementById('pw').classList.add('ef');
    }
    function hide() {
      document.getElementById('errMsg').classList.remove('show');
      document.getElementById('un').classList.remove('ef');
      document.getElementById('pw').classList.remove('ef');
    }
    document.getElementById('lf').addEventListener('submit', async e => {
      e.preventDefault(); hide();
      const btn = document.getElementById('sb');
      btn.classList.add('loading'); btn.disabled = true;
      try {
        const r = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: document.getElementById('un').value.trim(), password: document.getElementById('pw').value })
        });
        const d = await r.json();
        if (!r.ok) { show(d.detail || 'Login failed'); return; }
        sessionStorage.setItem('session_token', d.session_token);
        sessionStorage.setItem('user_data', JSON.stringify(d));
        window.location.href = '/dashboard?v=' + Date.now();
      } catch { show('Connection error — is the server running?'); }
      finally { btn.classList.remove('loading'); btn.disabled = false; }
    });
    document.getElementById('un').addEventListener('input', hide);
    document.getElementById('pw').addEventListener('input', hide);
  </script>
