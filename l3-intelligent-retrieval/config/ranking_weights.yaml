# L3 Intelligent Retrieval — Ranking Weights Configuration
# These weights are used by the DomainAwareRanker to compute final scores.

scoring:
  semantic_similarity: 0.50
  domain_affinity: 0.20
  intent_match: 0.15
  join_connectivity: 0.10
  multi_strategy_bonus: 0.05

retrieval:
  max_tables: 10
  semantic_top_k: 15
  semantic_min_threshold: 0.35
  keyword_exact_table_boost: 0.95
  keyword_exact_column_boost: 0.80
  keyword_domain_boost: 0.60
  keyword_domain_max_additions: 3
  fk_depth_1_boost: 0.70
  fk_depth_2_boost: 0.50
  multi_strategy_bonus_value: 0.08

domain_affinity:
  # Universal join anchors get a boost regardless of domain
  universal_anchors:
    - patients
    - encounters
    - providers
  universal_anchor_boost: 0.15

  # Super-protected tables get demoted unless explicitly queried
  super_protected_demotion: 0.40

intent_scoring:
  DATA_LOOKUP:
    column_match_boost: 0.20
    description_match_boost: 0.10
  AGGREGATION:
    fact_table_boost: 0.35       # raised from 0.15 — summary tables must beat transactional anchors
    dimension_table_boost: 0.10
  COMPARISON:
    sibling_table_boost: 0.10
  TREND:
    time_column_boost: 0.15
  JOIN_QUERY:
    bridge_table_boost: 0.20
    fk_connectivity_boost: 0.15
  EXISTENCE_CHECK:
    primary_table_boost: 0.10
  DEFINITION:
    column_match_boost: 0.15

token_budget:
  max_tokens: 4096
  policy_rules_reserved: 512
  row_filters_reserved: 256
  per_table_estimate: 300
  description_max_tokens: 100
