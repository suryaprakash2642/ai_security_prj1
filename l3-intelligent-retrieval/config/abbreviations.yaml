# Healthcare Abbreviation Expansion Map
# Used by the question preprocessor to additively expand abbreviations.
# The original term is KEPT; the expansion is APPENDED.

abbreviations:
  # Identifiers
  MRN: "medical record number"
  DOB: "date of birth"
  SSN: "social security number"
  NPI: "national provider identifier"
  DEA: "Drug Enforcement Administration number"
  EIN: "employer identification number"

  # Vital Signs / Labs
  BP: "blood pressure"
  HR: "heart rate"
  RR: "respiratory rate"
  SpO2: "oxygen saturation"
  BMI: "body mass index"
  CBC: "complete blood count"
  BMP: "basic metabolic panel"
  CMP: "comprehensive metabolic panel"
  BUN: "blood urea nitrogen"
  A1C: "hemoglobin A1C glycated hemoglobin"
  HbA1c: "hemoglobin A1C glycated hemoglobin"
  INR: "international normalized ratio"
  PT: "prothrombin time"
  PTT: "partial thromboplastin time"
  WBC: "white blood cell count"
  RBC: "red blood cell count"
  Hgb: "hemoglobin"
  Hct: "hematocrit"
  TSH: "thyroid stimulating hormone"
  PSA: "prostate specific antigen"
  BNP: "brain natriuretic peptide"
  CRP: "C-reactive protein"
  ESR: "erythrocyte sedimentation rate"
  LDL: "low density lipoprotein"
  HDL: "high density lipoprotein"
  GFR: "glomerular filtration rate"
  eGFR: "estimated glomerular filtration rate"

  # Coding Systems
  ICD: "diagnosis code ICD-10"
  CPT: "procedure code CPT"
  DRG: "diagnosis related group"
  NDC: "national drug code"
  LOINC: "logical observation identifiers names and codes"
  SNOMED: "systematized nomenclature of medicine"
  RxNorm: "normalized prescription drug names"
  HCPCS: "healthcare common procedure coding system"

  # Departments / Locations
  ICU: "intensive care unit"
  ER: "emergency room emergency department"
  ED: "emergency department"
  OR: "operating room"
  PACU: "post anesthesia care unit"
  NICU: "neonatal intensive care unit"
  PICU: "pediatric intensive care unit"
  L&D: "labor and delivery"
  OB: "obstetrics"
  GYN: "gynecology"

  # Clinical Terms
  Dx: "diagnosis"
  Rx: "prescription medication"
  Tx: "treatment"
  Hx: "history"
  Sx: "symptoms"
  Px: "prognosis"
  Fx: "fracture"
  Bx: "biopsy"
  ABG: "arterial blood gas"
  EKG: "electrocardiogram"
  ECG: "electrocardiogram"
  CT: "computed tomography"
  MRI: "magnetic resonance imaging"
  PET: "positron emission tomography"
  US: "ultrasound"
  CXR: "chest x-ray"

  # Administrative
  LOS: "length of stay"
  AMA: "against medical advice"
  ADA: "Americans with Disabilities Act"
  HIPAA: "Health Insurance Portability and Accountability Act"
  PHI: "protected health information"
  PII: "personally identifiable information"
  EMR: "electronic medical record"
  EHR: "electronic health record"
  PCP: "primary care provider"
  FTE: "full time equivalent"
  RVU: "relative value unit"
