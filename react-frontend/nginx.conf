server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: all non-file routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to backend services (in-cluster)
    location /api/l1/ { proxy_pass http://l1-identity:8001/;   proxy_set_header Host $host; }
    location /api/l3/ { proxy_pass http://l3-retrieval:8300/;   proxy_set_header Host $host; }
    location /api/l5/ { proxy_pass http://l5-generation:8500/;  proxy_set_header Host $host; }
    location /api/l6/ { proxy_pass http://l6-validation:8600/;  proxy_set_header Host $host; }
    location /api/l7/ { proxy_pass http://l7-execution:8700/;   proxy_set_header Host $host; }
    location /api/l8/ { proxy_pass http://l8-audit:8800/;       proxy_set_header Host $host; }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
